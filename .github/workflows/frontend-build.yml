name: Frontend build

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Build
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
