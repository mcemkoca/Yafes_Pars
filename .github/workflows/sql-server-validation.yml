name: SQL Server validation

on:
  pull_request:
    paths:
      - "database/migrations/**"
      - "database/validation/**"
      - "database/tools/**"
      - "database/templates/**"
      - ".github/workflows/sql-server-validation.yml"
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "database/migrations/**"
      - "database/validation/**"
      - "database/tools/**"
      - "database/templates/**"
      - ".github/workflows/sql-server-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sql-server-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-sql-server:
    name: Run guarded migrations and validations
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      YAFES_SQL_SERVER: localhost,1433
      YAFES_SQL_DATABASE: YafesPars_DEV
      YAFES_SQL_USER: sa
      YAFES_SQL_BACKUP_DIR: /tmp/yafes-sql-backups
      YAFES_SQL_TRUST_SERVER_CERTIFICATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run static SQL quality gate
        shell: pwsh
        run: ./database/tools/test-sql-quality-gate.ps1 -NoReportFile

      - name: Install sqlcmd
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -f /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/config/ubuntu/24.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list >/dev/null
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> "$GITHUB_PATH"

      - name: Start SQL Server container
        shell: bash
        run: |
          set -euo pipefail
          password="Yafes_CI_$(openssl rand -hex 12)!A1"
          echo "::add-mask::$password"
          echo "YAFES_SQL_PASSWORD=$password" >> "$GITHUB_ENV"
          mkdir -p "$YAFES_SQL_BACKUP_DIR"
          chmod 777 "$YAFES_SQL_BACKUP_DIR"

          docker run --detach \
            --name yafes-sqlserver \
            --env ACCEPT_EULA=Y \
            --env MSSQL_PID=Developer \
            --env MSSQL_SA_PASSWORD="$password" \
            --volume "$YAFES_SQL_BACKUP_DIR:$YAFES_SQL_BACKUP_DIR" \
            --publish 1433:1433 \
            mcr.microsoft.com/mssql/server:2022-latest

      - name: Wait for SQL Server
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if sqlcmd -S "$YAFES_SQL_SERVER" -U "$YAFES_SQL_USER" -P "$YAFES_SQL_PASSWORD" -C -Q "SELECT 1" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done

          echo "SQL Server did not become ready in time." >&2
          docker logs yafes-sqlserver >&2 || true
          exit 1

      - name: Create DEV database for backup preflight
        shell: bash
        run: |
          set -euo pipefail
          sqlcmd \
            -S "$YAFES_SQL_SERVER" \
            -U "$YAFES_SQL_USER" \
            -P "$YAFES_SQL_PASSWORD" \
            -C \
            -Q "IF DB_ID(N'YafesPars_DEV') IS NULL CREATE DATABASE [YafesPars_DEV];"

      - name: Run migrations and validations
        shell: pwsh
        run: ./database/tools/run-ci-sql-validation.ps1

      - name: Upload SQL execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sql-execution-logs
          path: database/execution-logs/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop SQL Server container
        if: always()
        shell: bash
        run: docker rm --force yafes-sqlserver >/dev/null 2>&1 || true
