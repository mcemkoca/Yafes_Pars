name: SQL Server validation

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "database/migrations/**"
      - "database/validation/**"
      - "database/tools/**"
      - "database/templates/**"
      - "database/ssms/**"
      - ".github/workflows/sql-server-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sql-server-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-sql-server:
    name: Run guarded migrations and validations
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      YAFES_SQL_SERVER: localhost
      YAFES_SQL_DATABASE: YafesPars_DEV
      YAFES_SQL_USER: sa
      YAFES_SQL_BACKUP_DIR: /tmp/yafes-sql-backups
      YAFES_SQL_TRUST_SERVER_CERTIFICATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Run static SQL quality gate
        shell: pwsh
        run: ./database/tools/test-sql-quality-gate.ps1 -NoReportFile

      - name: Start SQL Server container
        shell: bash
        run: |
          set -euo pipefail
          password="Yafes_CI_$(openssl rand -hex 12)!A1"
          container_name="yafes-sqlserver-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "::add-mask::$password"
          echo "YAFES_SQL_PASSWORD=$password" >> "$GITHUB_ENV"
          echo "YAFES_SQL_CONTAINER=$container_name" >> "$GITHUB_ENV"
          mkdir -p "$YAFES_SQL_BACKUP_DIR"

          docker run --detach \
            --name "$container_name" \
            --env ACCEPT_EULA=Y \
            --env MSSQL_PID=Developer \
            --env MSSQL_SA_PASSWORD="$password" \
            mcr.microsoft.com/mssql/server:2022-latest

      - name: Create container sqlcmd wrapper
        shell: bash
        run: |
          set -euo pipefail
          wrapper_dir="$RUNNER_TEMP/yafes-sqlcmd"
          mkdir -p "$wrapper_dir"
          cat > "$wrapper_dir/sqlcmd" <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail

          container="${YAFES_SQL_CONTAINER:?YAFES_SQL_CONTAINER is required}"
          args=()
          output_file=""
          container_output=""

          while (($#)); do
            case "$1" in
              -S)
                args+=("-S" "localhost")
                shift 2
                ;;
              -i)
                input_file="$2"
                container_input="/tmp/yafes-sqlcmd/$(basename "$input_file").$$.sql"
                docker exec "$container" mkdir -p /tmp/yafes-sqlcmd >/dev/null
                docker cp "$input_file" "$container:$container_input" >/dev/null
                args+=("-i" "$container_input")
                shift 2
                ;;
              -o)
                output_file="$2"
                container_output="/tmp/yafes-sqlcmd/$(basename "$output_file").$$.out"
                args+=("-o" "$container_output")
                shift 2
                ;;
              *)
                args+=("$1")
                shift
                ;;
            esac
          done

          if [[ -n "$container_output" ]]; then
            docker exec "$container" mkdir -p /tmp/yafes-sqlcmd >/dev/null
          fi

          set +e
          docker exec "$container" /opt/mssql-tools18/bin/sqlcmd "${args[@]}"
          exit_code=$?
          set -e

          if [[ -n "$output_file" ]]; then
            mkdir -p "$(dirname "$output_file")"
            docker cp "$container:$container_output" "$output_file" >/dev/null 2>&1 || true
          fi

          exit "$exit_code"
          BASH
          sed -i 's/^          //' "$wrapper_dir/sqlcmd"
          chmod +x "$wrapper_dir/sqlcmd"
          echo "$wrapper_dir" >> "$GITHUB_PATH"

      - name: Wait for SQL Server
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if docker exec "$YAFES_SQL_CONTAINER" /opt/mssql-tools18/bin/sqlcmd -S localhost -U "$YAFES_SQL_USER" -P "$YAFES_SQL_PASSWORD" -C -l 5 -Q "SELECT 1" >/dev/null 2>&1; then
              docker exec "$YAFES_SQL_CONTAINER" mkdir -p "$YAFES_SQL_BACKUP_DIR"
              docker exec "$YAFES_SQL_CONTAINER" chmod 777 "$YAFES_SQL_BACKUP_DIR"
              exit 0
            fi
            sleep 2
          done

          echo "SQL Server did not become ready in time." >&2
          docker logs "$YAFES_SQL_CONTAINER" >&2 || true
          exit 1

      - name: Create DEV database for backup preflight
        shell: bash
        run: |
          set -euo pipefail
          docker exec "$YAFES_SQL_CONTAINER" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost \
            -U "$YAFES_SQL_USER" \
            -P "$YAFES_SQL_PASSWORD" \
            -C \
            -Q "IF DB_ID(N'YafesPars_DEV') IS NULL CREATE DATABASE [YafesPars_DEV];"

      - name: Run migrations and validations
        shell: pwsh
        run: ./database/tools/run-ci-sql-validation.ps1

      - name: Run SSMS operator scripts against SQL Server
        shell: bash
        run: |
          set -euo pipefail
          log_dir="database/execution-logs/ssms-runtime"
          mkdir -p "$log_dir"

          for script in database/ssms/*.sql; do
            name="$(basename "$script")"
            echo "Running $name"
            sqlcmd \
              -S "$YAFES_SQL_SERVER" \
              -d "$YAFES_SQL_DATABASE" \
              -U "$YAFES_SQL_USER" \
              -P "$YAFES_SQL_PASSWORD" \
              -C -b -I -r 1 \
              -v YAFES_SQL_DATABASE="$YAFES_SQL_DATABASE" \
              -i "$script" \
              -o "$log_dir/$name.log"
          done

      - name: Upload SQL execution logs
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sql-execution-logs
          path: database/execution-logs/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop SQL Server container
        if: always()
        shell: bash
        run: docker rm --force "${YAFES_SQL_CONTAINER:-yafes-sqlserver}" >/dev/null 2>&1 || true
