name: Backend build

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-build.yml"
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/src/YafesPars.Api/YafesPars.Api.csproj

      - name: Build
        run: dotnet build backend/src/YafesPars.Api/YafesPars.Api.csproj --configuration Release --no-restore

      - name: Restore tests
        run: dotnet restore backend/tests/YafesPars.Tests/YafesPars.Tests.csproj

      - name: Test
        run: dotnet test backend/tests/YafesPars.Tests/YafesPars.Tests.csproj --configuration Release --no-restore --verbosity normal
