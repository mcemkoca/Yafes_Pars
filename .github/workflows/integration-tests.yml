name: Integration tests

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "database/migrations/**"
      - ".github/workflows/integration-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Write-flow integration tests (SQL Server)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
      SA_PASSWORD: "Yafes-Integr8-CI!"

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Yafes-Integr8-CI!"
          MSSQL_PID: Developer
        ports:
          - 1433:1433

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Restore integration tests
        run: dotnet restore backend/tests/YafesPars.IntegrationTests/YafesPars.IntegrationTests.csproj

      - name: Run integration tests
        env:
          YAFES_SQL_INTEGRATION: "Server=localhost,1433;User Id=sa;Password=Yafes-Integr8-CI!;TrustServerCertificate=True;Encrypt=False"
        run: >
          dotnet test backend/tests/YafesPars.IntegrationTests/YafesPars.IntegrationTests.csproj
          --configuration Release --no-restore --verbosity normal
