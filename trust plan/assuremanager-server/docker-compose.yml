version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: assuremanager-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
      - MSSQL_TCP_PORT=1433
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
      - ./sql:/sql-scripts:ro
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: assuremanager-api
    environment:
      - DB_SERVER=sqlserver
      - DB_NAME=AssureManagerDB
      - DB_USER=sa
      - DB_PASSWORD=YourStrong@Passw0rd
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./api:/app:ro
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: assuremanager-web
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sql-data:
