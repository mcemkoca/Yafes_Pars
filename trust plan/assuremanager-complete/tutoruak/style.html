<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssureManager Tutorial - Complete Installatie- & Gebruikersgids</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1215;
    color: #d1d5db;
    line-height: 1.7;
    min-height: 100vh;
  }
  a { color: #6ab06a; text-decoration: none; }
  a:hover { text-decoration: underline; }
  ::selection { background: #4a804a; color: #fff; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0f1215; }
  ::-webkit-scrollbar-thumb { background: #4a804a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #5a9a5a; }

  /* ===== LAYOUT ===== */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  section { padding: 60px 0; }
  h1, h2, h3, h4 { color: #f0f2f5; font-weight: 600; }
  h2 { font-size: 2rem; margin-bottom: 12px; position: relative; display: inline-block; }
  h2::after {
    content: '';
    position: absolute;
    bottom: -6px; left: 0;
    width: 60px; height: 3px;
    background: linear-gradient(90deg, #4a804a, #6ab06a);
    border-radius: 2px;
  }
  h3 { font-size: 1.3rem; margin: 24px 0 12px; color: #e5e7eb; }
  p { margin-bottom: 12px; }

  /* ===== NAVBAR ===== */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(15,18,21,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #2a3038;
    z-index: 1000;
    padding: 14px 0;
  }
  .navbar .container { display: flex; justify-content: space-between; align-items: center; }
  .navbar-brand {
    font-size: 1.25rem; font-weight: 700;
    color: #fff;
    display: flex; align-items: center; gap: 10px;
  }
  .navbar-brand .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #4a804a, #6ab06a);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .navbar-links { display: flex; gap: 28px; list-style: none; }
  .navbar-links a {
    color: #9ca3af; font-size: 0.875rem; font-weight: 500;
    transition: color 0.2s;
  }
  .navbar-links a:hover { color: #6ab06a; text-decoration: none; }
  .navbar-toggle { display: none; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }

  /* ===== HERO ===== */
  .hero {
    padding: 140px 0 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 50%, rgba(74,128,74,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 80% 20%, rgba(74,128,74,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(74,128,74,0.15);
    border: 1px solid rgba(74,128,74,0.3);
    color: #6ab06a;
    padding: 8px 18px;
    border-radius: 50px;
    font-size: 0.85rem; font-weight: 500;
    margin-bottom: 24px;
  }
  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, #b8c4b8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-subtitle {
    font-size: 1.15rem; color: #9ca3af;
    max-width: 640px; margin: 0 auto 36px;
  }
  .hero-line {
    width: 80px; height: 4px;
    background: linear-gradient(90deg, #4a804a, #6ab06a);
    border-radius: 2px; margin: 0 auto 36px;
  }
  .hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    border-radius: 8px;
    font-weight: 600; font-size: 0.95rem;
    transition: all 0.25s ease;
    cursor: pointer; border: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, #4a804a, #5a9a5a);
    color: #fff;
    box-shadow: 0 4px 16px rgba(74,128,74,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(74,128,74,0.4); text-decoration: none; }
  .btn-secondary {
    background: #1a1f24; color: #d1d5db;
    border: 1px solid #2a3038;
  }
  .btn-secondary:hover { border-color: #4a804a; color: #6ab06a; text-decoration: none; }

  /* ===== OVERVIEW CARDS ===== */
  .overview { padding: 40px 0 60px; }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }
  .card {
    background: #1a1f24;
    border: 1px solid #2a3038;
    border-radius: 12px;
    padding: 28px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #4a804a, #6ab06a);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: #4a804a;
    box-shadow: 0 8px 32px rgba(74,128,74,0.12);
  }
  .card:hover::before { opacity: 1; }
  .card-icon {
    width: 48px; height: 48px;
    background: rgba(74,128,74,0.12);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin-bottom: 16px;
  }
  .card h3 { margin: 0 0 8px; font-size: 1.1rem; }
  .card p { color: #9ca3af; font-size: 0.9rem; margin: 0; }
  .card .stat { color: #6ab06a; font-weight: 700; font-size: 1.6rem; margin-bottom: 4px; }

  /* ===== STEPS ===== */
  .step-section { border-top: 1px solid #1e2329; }
  .step-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 28px;
  }
  .step-number {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #4a804a, #5a9a5a);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(74,128,74,0.3);
  }
  .step-title h2 { margin: 0; }
  .step-title h2::after { display: none; }
  .step-title .step-subtitle { color: #9ca3af; font-size: 0.9rem; }
  .requirements-list {
    background: rgba(74,128,74,0.08);
    border: 1px solid rgba(74,128,74,0.2);
    border-radius: 10px;
    padding: 20px 24px;
    margin: 16px 0;
    list-style: none;
  }
  .requirements-list li {
    padding: 6px 0; padding-left: 24px;
    position: relative; font-size: 0.9rem;
  }
  .requirements-list li::before {
    content: '\2713';
    position: absolute; left: 0;
    color: #6ab06a; font-weight: 700;
  }

  /* ===== CODE BLOCKS ===== */
  .code-block {
    background: #111418;
    border: 1px solid #1e2329;
    border-radius: 10px;
    overflow: hidden;
    margin: 16px 0;
  }
  .code-header {
    background: #181c22;
    padding: 10px 18px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #1e2329;
  }
  .code-dots { display: flex; gap: 6px; }
  .code-dots span { width: 10px; height: 10px; border-radius: 50%; }
  .code-dots span:nth-child(1) { background: #ff5f56; }
  .code-dots span:nth-child(2) { background: #ffbd2e; }
  .code-dots span:nth-child(3) { background: #27c93f; }
  .code-title { font-size: 0.8rem; color: #6b7280; margin-left: 8px; }
  pre {
    padding: 18px 22px;
    overflow-x: auto;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.7;
  }
  code { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace; }
  .code-keyword { color: #c678dd; }
  .code-string { color: #98c379; }
  .code-comment { color: #5c6370; font-style: italic; }
  .code-function { color: #61afef; }
  .code-number { color: #d19a66; }
  .code-operator { color: #56b6c2; }

  /* ===== SCREENSHOT PLACEHOLDERS ===== */
  .screenshot-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin: 20px 0;
  }
  .screenshot {
    background: #161a20;
    border: 1px solid #252b33;
    border-radius: 10px;
    overflow: hidden;
    transition: all 0.3s;
  }
  .screenshot:hover { border-color: #4a804a; }
  .screenshot-header {
    background: #1e2329;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    font-size: 0.75rem; color: #6b7280;
  }
  .screenshot-body {
    height: 180px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #161a20, #1a1f26);
    position: relative;
    overflow: hidden;
  }
  .screenshot-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 40%, rgba(74,128,74,0.06) 0%, transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(74,128,74,0.04) 0%, transparent 50%);
  }
  .screenshot-placeholder {
    color: #4a5560;
    font-size: 0.85rem;
    text-align: center;
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  .screenshot-placeholder .ss-icon { font-size: 2.5rem; margin-bottom: 8px; display: block; }
  .screenshot-label {
    padding: 12px 14px;
    font-size: 0.8rem; color: #9ca3af;
    border-top: 1px solid #252b33;
  }

  /* ===== OPTIONS ===== */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
  .option-card {
    background: #161a20;
    border: 1px solid #252b33;
    border-radius: 10px;
    padding: 20px;
  }
  .option-card h4 { color: #6ab06a; margin-bottom: 10px; font-size: 1rem; }
  .option-card p { font-size: 0.85rem; color: #9ca3af; }

  /* ===== ARCHITECTURE DIAGRAM ===== */
  .arch-diagram {
    display: flex; align-items: center; justify-content: center;
    gap: 0;
    padding: 40px 20px;
    flex-wrap: wrap;
  }
  .arch-box {
    background: linear-gradient(145deg, #1a1f24, #1e242a);
    border: 1px solid #2a3038;
    border-radius: 14px;
    padding: 24px 28px;
    text-align: center;
    min-width: 160px;
    position: relative;
    transition: all 0.3s;
  }
  .arch-box:hover { border-color: #4a804a; transform: scale(1.03); }
  .arch-box .arch-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
  .arch-box .arch-label { font-weight: 600; color: #e5e7eb; font-size: 0.95rem; }
  .arch-box .arch-sublabel { font-size: 0.75rem; color: #6b7280; margin-top: 4px; }
  .arch-arrow {
    display: flex; align-items: center; justify-content: center;
    padding: 0 16px;
    color: #4a804a;
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .arch-stack {
    display: flex; flex-direction: column; gap: 4px;
    align-items: center;
    margin-top: 12px;
  }
  .arch-layer {
    font-size: 0.7rem; color: #5a6560;
    background: rgba(74,128,74,0.08);
    padding: 2px 10px;
    border-radius: 4px;
  }

  /* ===== DASHBOARD PAGES GRID ===== */
  .pages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    margin: 24px 0;
  }
  .page-card {
    background: #161a20;
    border: 1px solid #252b33;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    transition: all 0.25s;
    position: relative;
  }
  .page-card:hover {
    border-color: #4a804a;
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(74,128,74,0.1);
  }
  .page-card .page-icon {
    font-size: 2rem;
    margin-bottom: 10px;
    display: block;
  }
  .page-card .page-name { font-weight: 600; color: #e5e7eb; font-size: 0.9rem; }
  .page-card .page-desc { font-size: 0.8rem; color: #6b7280; margin-top: 4px; }

  /* ===== TROUBLESHOOTING TABLE ===== */
  .table-wrap { overflow-x: auto; margin: 20px 0; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  thead th {
    background: #1a1f24;
    padding: 14px 18px;
    text-align: left;
    font-weight: 600;
    color: #e5e7eb;
    border-bottom: 2px solid #4a804a;
  }
  tbody tr { border-bottom: 1px solid #1e2329; transition: background 0.2s; }
  tbody tr:hover { background: rgba(74,128,74,0.06); }
  tbody td { padding: 14px 18px; vertical-align: top; }
  tbody td:first-child { font-weight: 500; color: #fca5a5; white-space: nowrap; }
  tbody td code {
    background: rgba(74,128,74,0.12);
    color: #6ab06a;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.82rem;
  }

  /* ===== FOOTER ===== */
  .footer {
    border-top: 1px solid #1e2329;
    padding: 48px 0 32px;
    text-align: center;
  }
  .footer-logo {
    font-size: 1.3rem; font-weight: 700; color: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 16px;
  }
  .footer-links { display: flex; justify-content: center; gap: 28px; margin: 20px 0; flex-wrap: wrap; }
  .footer-links a { color: #9ca3af; font-size: 0.85rem; }
  .footer-links a:hover { color: #6ab06a; }
  .footer-copy { color: #4a5560; font-size: 0.8rem; margin-top: 20px; }

  /* ===== TOAST DEMO ===== */
  .toast-demo { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
  .toast { padding: 12px 18px; border-radius: 8px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
  .toast-success { background: rgba(74,128,74,0.15); border: 1px solid rgba(74,128,74,0.3); color: #6ab06a; }
  .toast-error { background: rgba(220,80,60,0.12); border: 1px solid rgba(220,80,60,0.25); color: #e07a6e; }
  .toast-info { background: rgba(80,140,220,0.12); border: 1px solid rgba(80,140,220,0.25); color: #7aaeea; }

  /* ===== KBD ===== */
  kbd {
    background: #2a3038; border: 1px solid #3a4048;
    border-radius: 4px; padding: 2px 8px;
    font-size: 0.82rem; font-family: monospace;
    box-shadow: 0 2px 0 #1a1f24;
  }

  /* ===== TAGS ===== */
  .tag {
    display: inline-flex; align-items: center;
    background: rgba(74,128,74,0.12);
    color: #6ab06a;
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 0.78rem; font-weight: 500;
    margin: 2px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .navbar-links { display: none; }
    .navbar-links.active { display: flex; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: rgba(15,18,21,0.98); padding: 16px 24px; border-bottom: 1px solid #2a3038; }
    .navbar-toggle { display: block; }
    .hero { padding: 120px 0 60px; }
    .options { grid-template-columns: 1fr; }
    .arch-diagram { flex-direction: column; gap: 8px; }
    .arch-arrow { transform: rotate(90deg); padding: 8px 0; }
    h2 { font-size: 1.5rem; }
  }

  /* ===== PRINT ===== */
  @media print {
    body { background: #fff; color: #000; }
    .navbar, .hero-bg, .btn { display: none; }
    .card, .code-block, table { break-inside: avoid; }
    section { padding: 24px 0; }
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
  .fade-in-d1 { animation-delay: 0.1s; }
  .fade-in-d2 { animation-delay: 0.2s; }
  .fade-in-d3 { animation-delay: 0.3s; }
  .fade-in-d4 { animation-delay: 0.4s; }

  /* ===== SECTION SEPARATOR ===== */
  .section-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a3038, transparent);
    margin: 0 auto;
    max-width: 600px;
  }

  /* ===== ALERT BOXES ===== */
  .alert {
    border-radius: 10px;
    padding: 16px 20px;
    margin: 16px 0;
    display: flex; align-items: flex-start; gap: 12px;
    font-size: 0.9rem;
  }
  .alert-warning { background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2); color: #eab308; }
  .alert-info { background: rgba(80,140,220,0.08); border: 1px solid rgba(80,140,220,0.2); color: #7aaeea; }
  .alert-icon { font-size: 1.2rem; flex-shrink: 0; }

  /* ===== ENV TABLE ===== */
  .env-table { margin: 12px 0; }
  .env-table td { padding: 8px 16px; font-size: 0.85rem; border: none; }
  .env-table td:first-child { color: #6ab06a; font-family: monospace; font-weight: 500; white-space: nowrap; }
  .env-table tr:nth-child(odd) { background: rgba(255,255,255,0.02); }
  .env-table tr { border-bottom: 1px solid #1a1e24; }
</style>
