<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yafes Pars — SSMS İnteraktif Tutorial</title>
<style>
:root{
  --bg:#1e1e1e;--bg2:#252526;--bg3:#2d2d30;--bg4:#3c3c3c;
  --border:#3e3e42;--accent:#007acc;--accent2:#1a8ad4;
  --text:#d4d4d4;--dim:#858585;--bright:#fff;
  --kw:#569cd6;--fn:#dcdcaa;--str:#ce9178;--num:#b5cea8;
  --cmt:#6a9955;--tbl:#4ec9b0;--op:#9cdcfe;--red:#f44747;
  --green:#4ec9b0;--yellow:#e2c08d;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Consolas,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;user-select:none}

/* ── TITLEBAR ── */
#titlebar{background:#323233;border-bottom:1px solid #111;height:30px;display:flex;align-items:center;padding:0 12px;gap:0;flex-shrink:0}
#titlebar-logo{font-weight:700;font-size:12px;color:#ccc;margin-right:16px;letter-spacing:.5px}
.mnu{padding:0 10px;height:100%;display:flex;align-items:center;font-size:12px;color:#ccc;cursor:pointer}
.mnu:hover{background:#505050}

/* ── TOOLBAR ── */
#toolbar{background:#2d2d2d;border-bottom:1px solid var(--border);height:28px;display:flex;align-items:center;padding:0 6px;gap:1px;flex-shrink:0}
.tb{background:0;border:1px solid transparent;color:var(--text);padding:0 7px;height:22px;cursor:pointer;border-radius:2px;font-size:11px;display:flex;align-items:center;gap:3px;transition:background .1s}
.tb:hover:not(:disabled){background:#3e3e3e;border-color:#555}
.tb:disabled{opacity:.4;cursor:default}
.tb.run{background:#388a34;color:#fff;border-color:#4a9e46}
.tb.run:hover{background:#2d7429}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 3px}
.db-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:0 8px;height:22px;font-size:11px;border-radius:2px;min-width:150px}

/* ── LAYOUT ── */
#layout{display:flex;flex:1;overflow:hidden}

/* ── OE ── */
#oe{width:250px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
#oe-hdr{background:#333335;padding:5px 10px;font-size:11px;font-weight:700;letter-spacing:.4px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#oe-hdr span{cursor:pointer;opacity:.6;font-weight:400}
#oe-search{padding:4px 6px;border-bottom:1px solid var(--border);flex-shrink:0}
#oe-search input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 7px;font-size:11px;border-radius:2px;outline:0}
#oe-search input:focus{border-color:var(--accent)}
#oe-tree{flex:1;overflow-y:auto;overflow-x:hidden}

.nd{user-select:none}
.nr{display:flex;align-items:center;padding:2px 0;padding-left:var(--d,4px);cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:background .08s}
.nr:hover{background:#2a2d2e}
.nr.sel{background:#094771}
.nr.hl{animation:hl .7s ease-in-out 3}
@keyframes hl{0%,100%{background:#0e3a5c}50%{background:#1464a0}}
.nr.clickable-hint{border-color:#007acc55;background:#0d1f2d}
.nr.clickable-hint:hover{border-color:var(--accent);background:#0e2a3d}
.ea{width:14px;font-size:9px;color:var(--dim);text-align:center;flex-shrink:0;transition:transform .15s}
.ea.op{transform:rotate(90deg)}
.ni{font-size:12px;margin:0 4px;flex-shrink:0}
.nl{font-size:12px;overflow:hidden;text-overflow:ellipsis;flex:1}
.nc{display:none}
.nc.op{display:block}

/* ── EDITOR AREA ── */
#ea{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tabs{background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;height:26px;padding:0 4px;gap:2px;flex-shrink:0}
.tab{padding:3px 14px;background:#3c3c3c;border:1px solid var(--border);border-bottom:none;font-size:11px;color:var(--dim);border-radius:3px 3px 0 0;cursor:pointer}
.tab.on{background:var(--bg);color:var(--bright);border-bottom:1px solid var(--bg)}
#qe{flex:1;display:flex;overflow:hidden;position:relative}
#lnum{background:#1e1e1e;padding:12px 6px 12px 0;text-align:right;color:#444;font:13px/1.6 Consolas,monospace;min-width:36px;border-right:1px solid #2a2a2a;flex-shrink:0;overflow:hidden}
#cwrap{flex:1;padding:12px;overflow:auto;position:relative}
#prog{position:absolute;top:0;left:0;right:0;height:3px;display:none;background:linear-gradient(90deg,var(--accent),#56c4ff,var(--accent));background-size:200%;animation:pg 1s linear infinite}
@keyframes pg{0%{background-position:0}100%{background-position:200%}}
#code{white-space:pre;font:13px/1.6 Consolas,monospace}
#cur{display:inline-block;width:2px;height:15px;background:#aeafad;animation:bl 1s step-end infinite;vertical-align:text-bottom}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

.kw{color:var(--kw)}.fn{color:var(--fn)}.str{color:var(--str)}.num{color:var(--num)}.cmt{color:var(--cmt)}.tbl{color:var(--tbl)}.op{color:var(--op)}

/* ── SP PANEL ── */
#spp{display:none;background:#1a2418;border-top:1px solid #3a5a3a;padding:8px 14px;flex-shrink:0}
#spp h4{font-size:11px;color:var(--tbl);margin-bottom:7px}
.sprow{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.spf{display:flex;align-items:center;gap:5px;font-size:11px}
.spf label{color:var(--op);white-space:nowrap}
.spf input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:2px;font:11px Consolas;width:130px;outline:0}
.spf input:focus{border-color:var(--accent)}
.btnsp{background:#388a34;color:#fff;border:none;padding:5px 14px;border-radius:3px;cursor:pointer;font-size:11px;margin-top:6px}
.btnsp:hover{background:#2d7429}

/* ── RESULTS ── */
#rp{height:200px;border-top:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0}
#rtabs{display:flex;align-items:center;background:#2d2d30;border-bottom:1px solid var(--border);flex-shrink:0}
.rt{padding:4px 14px;font-size:11px;cursor:pointer;color:var(--dim);border-right:1px solid var(--border)}
.rt.on{background:var(--bg2);color:var(--bright)}
#rcount{margin-left:auto;padding:0 10px;font-size:10px;color:var(--dim)}
#rc{flex:1;overflow:auto}
#rg{width:100%;border-collapse:collapse;font:12px Consolas,monospace;display:none}
#rg th{background:#16213e;color:var(--op);padding:3px 10px;border:1px solid #333;text-align:left;font-weight:400;font-size:11px;position:sticky;top:0;z-index:1}
#rg td{padding:2px 10px;border:1px solid #2a2a2a;color:var(--text)}
#rg tr:nth-child(even) td{background:#1c1c1c}
#rg tr:hover td{background:#2a2d2e}
.fr td{animation:fr .5s ease-out}
@keyframes fr{from{background:#0d3320}to{background:transparent}}
#mp{padding:10px 14px;font:12px Consolas,monospace;display:none}
.mok{color:var(--tbl)}.merr{color:var(--red)}.minf{color:var(--op)}

/* ── STATUS ── */
#sb{background:var(--accent);color:#fff;height:22px;display:flex;align-items:center;padding:0 12px;font-size:11px;gap:16px;flex-shrink:0}
#sbr{margin-left:auto;display:flex;gap:14px;opacity:.9}

/* ── CONNECT DIALOG ── */
#dlg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:300}
.dbox{background:#2d2d30;border:1px solid #555;border-radius:4px;width:440px;box-shadow:0 16px 48px rgba(0,0,0,.8)}
.dttl{background:#3c3f41;padding:9px 14px;font-size:13px;font-weight:700;border-bottom:1px solid #555;display:flex;align-items:center;gap:8px}
.dbody{padding:18px}
.df{margin-bottom:12px}
.df label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.df input,.df select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:2px;font:12px Consolas;outline:0}
.df input.focus,.df input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.dfoot{padding:10px 14px;background:#3c3f41;border-top:1px solid #555;display:flex;justify-content:flex-end;gap:8px}
.btncon{background:var(--accent);color:#fff;border:none;padding:6px 18px;border-radius:3px;cursor:pointer;font-size:12px}
.btncon:disabled{opacity:.6}
.btndlg{background:#5a5a5a;color:var(--text);border:1px solid #666;padding:6px 14px;border-radius:3px;cursor:pointer;font-size:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.spin{width:12px;height:12px;border:2px solid #444;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px}

/* ── TUTORIAL CARD ── */
#tov{position:fixed;inset:0;pointer-events:none;z-index:600}
#spl{position:absolute;border-radius:3px;box-shadow:0 0 0 9999px rgba(0,0,0,.55);border:2px solid var(--accent);transition:all .35s cubic-bezier(.4,0,.2,1);pointer-events:none;display:none}
#tc{position:absolute;background:#0c1a2a;border:1px solid var(--accent);border-radius:8px;padding:16px 18px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,.75);pointer-events:all;transition:top .3s,left .3s}
#tc h3{font-size:13px;color:var(--op);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.tbg{background:var(--accent);color:#fff;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;flex-shrink:0}
#tc p{font-size:12px;color:var(--text);line-height:1.65;margin-bottom:12px}
#tc code{background:#050d15;padding:1px 5px;border-radius:3px;font-family:Consolas;color:var(--tbl);font-size:11px}
#tc kbd{background:#3a3a3a;border:1px solid #555;border-radius:3px;padding:1px 5px;font:11px Consolas;color:#eee}
.tnav{display:flex;align-items:center;gap:7px}
.btnn{background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700}
.btnn:hover{background:var(--accent2)}
.btnsk{background:0;color:var(--dim);border:1px solid #555;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.btnsk:hover{color:var(--text)}
.tdots{display:flex;gap:5px;margin-left:auto}
.tdot{width:6px;height:6px;border-radius:50%;background:#444;transition:background .2s}
.tdot.on{background:var(--accent)}

/* ── ACTION HINT ── */
.action-hint{position:fixed;background:#1a2a1a;border:1px solid var(--tbl);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--tbl);pointer-events:none;z-index:650;animation:bounce .6s ease-in-out infinite alternate;display:none}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-4px)}}
#arrow{position:fixed;pointer-events:none;z-index:650;display:none;animation:pulse-arr .8s ease-in-out infinite alternate}
@keyframes pulse-arr{0%{opacity:.6;transform:scale(.9)}100%{opacity:1;transform:scale(1.05)}}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:#555;border-radius:4px}
</style>
</head>
<body>

<!-- CONNECT DIALOG -->
<div id="dlg">
  <div class="dbox">

<script>
// ─── DATA ───────────────────────────────────────────────
const TREE = [{id:'svr',l:'yafespars-sql.database.windows.net',i:'🖥️',kids:[
  {id:'dbs-n',l:'Veritabanları',i:'📁',kids:[
    {id:'yf',l:'YafesPars',i:'🗄️',kids:[

        {id:'tnp',l:'person.NaturalPersons',i:'📋'},{id:'tlp',l:'person.LegalPersons',i:'📋'},
        {id:'tadr',l:'person.Addresses',i:'📋'},{id:'tcon',l:'policy.Contracts',i:'📋'},
        {id:'tpar',l:'policy.ContractParties',i:'📋'},{id:'tobj',l:'policy.ContractObjects',i:'📋'},

      ]},
      {id:'vws',l:'Görünümler',i:'📁',kids:[
        {id:'vps',l:'reporting.PolicySummary',i:'👁️'},{id:'vcs',l:'reporting.ClaimSummary',i:'👁️'},
      ]},
      {id:'sps',l:'Saklı Yordamlar',i:'📁',kids:[
        {id:'sp-np',l:'SP_CreateNaturalPerson',i:'⚙️'},{id:'sp-lp',l:'SP_CreateLegalPerson',i:'⚙️'},
        {id:'sp-co',l:'SP_CreateContract',i:'⚙️'},{id:'sp-cl',l:'SP_CreateClaim',i:'⚙️'},
        {id:'sp-cc',l:'SP_CloseClaim',i:'⚙️'},{id:'sp-tk',l:'SP_CreateTask',i:'⚙️'},
      ]},

    rows:[['8a1f2c3d','tenant-001','Ahmet','Yılmaz','12345678901','1985-03-15','2024-01-10 09:15'],

// ─── TREE ────────────────────────────────────────────────
const oeTree = document.getElementById('oe-tree');
function mkTree(nodes, depth){
  const f = document.createDocumentFragment();
  nodes.forEach(n => {
    const hasK = n.kids && n.kids.length;
    const wrap = document.createElement('div');
    wrap.className='nd'; wrap.id='nd-'+n.id;
    const row = document.createElement('div');
    row.className='nr'; row.id='row-'+n.id;
    row.style.setProperty('--d',(depth*16+4)+'px');
    const ea=document.createElement('span'); ea.className='ea'; ea.id='ea-'+n.id; ea.textContent=hasK?'▶':'';
    const ni=document.createElement('span'); ni.className='ni'; ni.textContent=n.i||'';
    const nl=document.createElement('span'); nl.className='nl'; nl.textContent=n.l;
    row.append(ea,ni,nl); wrap.appendChild(row);
    if(hasK){
      const ch=document.createElement('div'); ch.className='nc'; ch.id='ch-'+n.id;
      ch.appendChild(mkTree(n.kids,depth+1)); wrap.appendChild(ch);
      row.addEventListener('click',()=>toggle(n.id));
    }
    row.addEventListener('click',()=>{
      document.querySelectorAll('.nr.sel').forEach(r=>r.classList.remove('sel'));
      row.classList.add('sel');
      if(n.id.startsWith('t')&&DATA[n.id]) onTable(n);
      if(n.id.startsWith('sp-')) onSP(n);
      advanceTutorial(n.id);
    });
    f.appendChild(wrap);
  });
  return f;
}

// ─── SQL HIGHLIGHT ────────────────────────────────────────
const KWS=/\b(SELECT|FROM|WHERE|AND|OR|NOT|INSERT|INTO|VALUES|UPDATE|SET|DELETE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AS|TOP|ORDER|BY|GROUP|HAVING|DISTINCT|COUNT|SUM|AVG|MAX|MIN|EXEC|EXECUTE|DECLARE|BEGIN|END|COMMIT|ROLLBACK|USE|GO|CREATE|TABLE|ALTER|DROP|PROCEDURE|RETURN|IS|NULL|CASE|WHEN|THEN|ELSE|WITH|CAST|CONVERT)\b/gi;
function hl_sql(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/--[^\n]*/g,m=>`<span class="cmt">${m}</span>`)
    .replace(/'[^']*'/g,m=>`<span class="str">${m}</span>`)
    .replace(/\b\d+(?:\.\d+)?\b/g,m=>`<span class="num">${m}</span>`)
    .replace(KWS,m=>`<span class="kw">${m.toUpperCase()}</span>`)
    .replace(/\[([^\]]+)\]/g,(_,m)=>`[<span class="tbl">${m}</span>]`)
    .replace(/\b(SP_\w+)\b/g,m=>`<span class="fn">${m}</span>`)
    .replace(/@\w+/g,m=>`<span class="op">${m}</span>`);
}
function setCode(plain){
  document.getElementById('code').innerHTML=hl_sql(plain);
  const n=(plain.match(/\n/g)||[]).length+1;
  document.getElementById('lnum').textContent=Array.from({length:n},(_,i)=>i+1).join('\n');
}
async function typeCode(lines,spd=22){
  const plain=lines.join('\n'), codeEl=document.getElementById('code'), lEl=document.getElementById('lnum');
  for(let i=0;i<=plain.length;i++){
    const chunk=plain.slice(0,i);
    codeEl.innerHTML=hl_sql(chunk);
    lEl.textContent=Array.from({length:(chunk.match(/\n/g)||[]).length+1},(_,j)=>j+1).join('\n');
    const ch=plain[i]; if(ch===undefined)break;
    await sleep(ch==='\n'?spd*3:spd);
  }
}

// ─── SPOTLIGHT / CARD ─────────────────────────────────────
function spot(sel){
  const s=document.getElementById('spl');
  const el=sel?document.querySelector(sel):null;
  if(!el){s.style.display='none';return;}
  const r=el.getBoundingClientRect();
  s.style.cssText=`display:block;top:${r.top-4}px;left:${r.left-4}px;width:${r.width+8}px;height:${r.height+8}px;`;
}
function posCard(sel,side){
  const card=document.getElementById('tc'); card.style.transform='';
  const el=sel?document.querySelector(sel):null;
  if(!el){card.style.top='50%';card.style.left='50%';card.style.transform='translate(-50%,-50%)';return;}
  const r=el.getBoundingClientRect(),W=window.innerWidth,H=window.innerHeight,CW=330,CH=230,M=12;
  let t,l;
  if(side==='right'){l=r.right+M;t=Math.max(M,Math.min(H-CH-M,r.top));}
  else if(side==='below'){t=r.bottom+M;l=Math.max(M,Math.min(W-CW-M,r.left));}
  else if(side==='above'){t=r.top-CH-M;l=Math.max(M,Math.min(W-CW-M,r.left));}
  else{t=r.bottom+M;l=Math.max(M,Math.min(W-CW-M,r.left));}
  if(l+CW>W)l=W-CW-M; if(t<M)t=M; if(t+CH>H)t=H-CH-M;
  card.style.top=t+'px'; card.style.left=l+'px';
}
function showHint(text,targetSel){
  const h=document.getElementById('hint'),a=document.getElementById('arrow');
  if(!text||!targetSel){h.style.display='none';a.style.display='none';return;}
  const el=document.querySelector(targetSel);
  if(!el){h.style.display='none';a.style.display='none';return;}
  const r=el.getBoundingClientRect();
  h.textContent=text; h.style.display='block';
  h.style.top=(r.top-36)+'px'; h.style.left=(r.left+r.width/2-h.offsetWidth/2)+'px';
  a.style.display='block'; a.style.top=(r.top-18)+'px'; a.style.left=(r.left+r.width/2-10)+'px';
}
function hideHint(){document.getElementById('hint').style.display='none';document.getElementById('arrow').style.display='none';}

let step=0, waiting=null;

async function showStep(i){
  const s=STEPS[i];
  document.getElementById('tbg').textContent=`${i+1}/${STEPS.length}`;
  document.getElementById('tttl').textContent=s.title;
  document.getElementById('tbody').innerHTML=s.body.replace(/\n/g,'<br>');
  document.getElementById('btnn').textContent=i===STEPS.length-1?'Kapat ✓':'Devam →';
  buildDots();
  waiting=s.waitFor;
  await s.setup();
}
async function advanceTutorial(eventId){
  if(!waiting||waiting!==eventId)return;
  waiting=null; hideHint();
  if(eventId==='__connected__') document.getElementById('dlg').style.display='none';
  if(step<STEPS.length-1){step++;await showStep(step);}
}
