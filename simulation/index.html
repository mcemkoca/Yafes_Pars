<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yafes Pars – SSMS Tutorial Simülasyonu</title>
<style>
  :root {
    --bg: #1e1e1e;
    --bg2: #252526;
    --bg3: #2d2d30;
    --bg4: #3c3c3c;
    --border: #444;
    --accent: #007acc;
    --accent2: #0e70c0;
    --text: #d4d4d4;
    --text-dim: #858585;
    --text-bright: #ffffff;
    --green: #4ec9b0;
    --blue: #569cd6;
    --orange: #ce9178;
    --yellow: #dcdcaa;
    --purple: #c586c0;
    --red: #f44747;
    --grid-line: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Consolas, monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 13px; }

  /* MENU BAR */
  #menubar { background: #2c2c2c; border-bottom: 1px solid var(--border); display: flex; align-items: center; height: 24px; padding: 0 4px; flex-shrink: 0; }
  .menu-item { padding: 0 8px; height: 100%; display: flex; align-items: center; cursor: pointer; color: var(--text); font-size: 12px; }
  .menu-item:hover { background: var(--accent); color: #fff; }

  /* TOOLBAR */
  #toolbar { background: #2d2d2d; border-bottom: 1px solid var(--border); display: flex; align-items: center; height: 30px; padding: 0 6px; gap: 2px; flex-shrink: 0; }
  .tb-btn { background: transparent; border: 1px solid transparent; color: var(--text); padding: 2px 6px; cursor: pointer; border-radius: 2px; font-size: 11px; display: flex; align-items: center; gap: 4px; height: 22px; }
  .tb-btn:hover { background: var(--bg4); border-color: var(--border); }
  .tb-btn.primary { background: #388a34; color: #fff; border-color: #4a9e46; }
  .tb-btn.primary:hover { background: #2d7429; }
  .tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .tb-db-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 2px 6px; height: 22px; font-size: 11px; border-radius: 2px; min-width: 160px; }

  /* MAIN LAYOUT */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* OBJECT EXPLORER */
  #oe { width: 250px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  #oe-header { background: #3c3c3c; padding: 5px 8px; font-size: 11px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; letter-spacing: 0.3px; }
  #oe-search { padding: 4px 6px; border-bottom: 1px solid var(--border); }
  #oe-search input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; font-size: 11px; border-radius: 2px; }
  #oe-tree { flex: 1; overflow-y: auto; }
  .tree-node { user-select: none; }
  .tree-row { display: flex; align-items: center; padding: 2px 0; padding-left: var(--depth, 4px); cursor: pointer; white-space: nowrap; }
  .tree-row:hover { background: #2a2d2e; }
  .tree-row.selected { background: #094771; }
  .tree-row.highlighted { background: #1a3a5c; animation: pulse-row 0.8s ease-in-out 4; }
  @keyframes pulse-row { 0%,100%{background:#1a3a5c} 50%{background:#1e6bb8} }
  .expand-arrow { width: 14px; font-size: 8px; color: var(--text-dim); flex-shrink: 0; text-align: center; transition: transform 0.15s; }
  .expand-arrow.open { transform: rotate(90deg); }
  .tree-icon { font-size: 12px; margin-right: 4px; flex-shrink: 0; }
  .tree-label { font-size: 12px; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .tree-children { display: none; }
  .tree-children.open { display: block; }

  /* EDITOR AREA */
  #editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #tabs { background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; height: 28px; padding: 0 4px; }
  .tab { padding: 4px 14px; background: var(--bg4); border: 1px solid var(--border); border-bottom: none; cursor: pointer; font-size: 11px; color: var(--text-dim); margin-right: 2px; border-radius: 3px 3px 0 0; }
  .tab.active { background: var(--bg); color: var(--text-bright); border-bottom: 1px solid var(--bg); }

  #query-editor { flex: 1; display: flex; overflow: hidden; }
  #line-nums { background: #1e1e1e; padding: 12px 8px; text-align: right; color: #4a4a4a; font-family: Consolas, monospace; font-size: 13px; line-height: 1.6; min-width: 40px; border-right: 1px solid #333; flex-shrink: 0; user-select: none; }
  #code-wrap { flex: 1; padding: 12px; overflow-y: auto; position: relative; }
  #exec-progress { position: absolute; top: 0; left: 0; right: 0; height: 3px; display: none; background: linear-gradient(90deg, var(--accent) 0%, #56c4ff 50%, var(--accent) 100%); background-size: 200% 100%; animation: prog 1s linear infinite; }
  @keyframes prog { 0%{background-position:0%} 100%{background-position:200%} }
  #code-display { white-space: pre; font-family: Consolas, 'Courier New', monospace; font-size: 13px; line-height: 1.6; }
  #cursor { display: inline-block; width: 2px; height: 15px; background: #aeafad; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* syntax */
  .kw { color: #569cd6; }
  .fn { color: #dcdcaa; }
  .str { color: #ce9178; }
  .num { color: #b5cea8; }
  .cmt { color: #6a9955; }
  .tbl { color: #4ec9b0; }
  .op  { color: #9cdcfe; }

  /* RESULTS */
  #results-panel { height: 210px; border-top: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg2); flex-shrink: 0; }
  #results-tabs { display: flex; align-items: center; background: var(--bg3); border-bottom: 1px solid var(--border); }
  .rtab { padding: 4px 14px; font-size: 11px; cursor: pointer; color: var(--text-dim); border-right: 1px solid var(--border); }
  .rtab.active { background: var(--bg2); color: var(--text-bright); }
  #row-count { margin-left: auto; padding: 0 10px; font-size: 10px; color: var(--text-dim); }
  #results-content { flex: 1; overflow: auto; }
  #results-grid { width: 100%; border-collapse: collapse; font-size: 12px; font-family: Consolas, monospace; display: none; }
  #results-grid th { background: #16213e; color: #9cdcfe; padding: 3px 10px; border: 1px solid #333; text-align: left; font-weight: normal; font-size: 11px; position: sticky; top: 0; z-index: 1; }
  #results-grid td { padding: 2px 10px; border: 1px solid var(--grid-line); color: var(--text); }
  #results-grid tr:nth-child(even) td { background: #1a1a1a; }
  #results-grid tr:hover td { background: #2a2d2e; }
  .new-row td { animation: fadeRow 0.5s ease-out; }
  @keyframes fadeRow { from{background:#0d3320} to{background:transparent} }
  #msg-panel { padding: 10px 14px; font-size: 12px; font-family: Consolas, monospace; display: none; }
  .msg-ok  { color: #4ec9b0; }
  .msg-err { color: #f44747; }
  .msg-inf { color: #9cdcfe; }

  /* STATUS BAR */
  #statusbar { background: var(--accent); color: #fff; height: 22px; display: flex; align-items: center; padding: 0 12px; font-size: 11px; gap: 18px; flex-shrink: 0; }
  #status-right { margin-left: auto; display: flex; gap: 16px; opacity: .9; }

  /* SP PANEL */
  #sp-panel { display: none; background: #1e2a1e; border-top: 1px solid #3a5a3a; padding: 8px 14px; flex-shrink: 0; }
  #sp-panel h4 { font-size: 11px; color: #4ec9b0; margin-bottom: 8px; }
  .sp-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; align-items: center; }
  .sp-field { display: flex; align-items: center; gap: 5px; font-size: 11px; }
  .sp-field label { color: #9cdcfe; white-space: nowrap; }
  .sp-field input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 3px 6px; border-radius: 2px; font-size: 11px; width: 130px; font-family: Consolas; }
  .btn-exec-sp { background: #388a34; color: #fff; border: none; padding: 5px 14px; border-radius: 3px; cursor: pointer; font-size: 11px; margin-top: 4px; }
  .btn-exec-sp:hover { background: #2d7429; }

  /* CONNECT DIALOG */
  #connect-dialog { position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .dialog-box { background: #2d2d30; border: 1px solid #555; border-radius: 4px; width: 440px; box-shadow: 0 16px 48px rgba(0,0,0,0.8); overflow: hidden; }
  .dialog-title { background: #3c3f41; padding: 9px 14px; font-size: 13px; font-weight: bold; border-bottom: 1px solid #555; display: flex; align-items: center; gap: 8px; }
  .dialog-body { padding: 18px; }
  .dialog-field { margin-bottom: 12px; }
  .dialog-field label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .dialog-field input, .dialog-field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 2px; font-size: 12px; font-family: Consolas; }
  .dialog-field input.typing { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .dialog-footer { padding: 10px 14px; background: #3c3f41; border-top: 1px solid #555; display: flex; justify-content: flex-end; gap: 8px; }
  .btn-connect { background: var(--accent); color: #fff; border: none; padding: 6px 18px; border-radius: 3px; cursor: pointer; font-size: 12px; }
  .btn-connect:disabled { opacity: 0.7; }
  .btn-dialog { background: #5a5a5a; color: var(--text); border: 1px solid #666; padding: 6px 14px; border-radius: 3px; cursor: pointer; font-size: 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spinner { width: 12px; height: 12px; border: 2px solid #444; border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 4px; }

  /* TUTORIAL */
  #tutorial-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 300; }
  .t-spotlight { position: absolute; border-radius: 4px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.58); border: 2px solid var(--accent); transition: all .4s cubic-bezier(.4,0,.2,1); pointer-events: none; }
  .t-card { position: absolute; background: #0d1b2a; border: 1px solid var(--accent); border-radius: 8px; padding: 18px 20px; width: 330px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); pointer-events: all; transition: top .35s, left .35s; }
  .t-card h3 { font-size: 14px; color: #9cdcfe; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .t-badge { background: var(--accent); color: #fff; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: bold; flex-shrink: 0; }
  .t-card p { font-size: 12px; color: var(--text); line-height: 1.65; margin-bottom: 14px; }
  .t-card code { background: #0a0a0a; padding: 1px 5px; border-radius: 3px; font-family: Consolas; color: #4ec9b0; font-size: 11px; }
  .t-nav { display: flex; align-items: center; gap: 8px; }
  .btn-next { background: var(--accent); color: #fff; border: none; padding: 7px 18px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
  .btn-next:hover { background: var(--accent2); }
  .btn-skip { background: transparent; color: var(--text-dim); border: 1px solid #555; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .t-dots { display: flex; gap: 5px; margin-left: auto; }
  .t-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; transition: background .2s; }
  .t-dot.on { background: var(--accent); }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
</style>
</head>
<body>

<!-- CONNECT DIALOG -->
<div id="connect-dialog">
  <div class="dialog-box">
    <div class="dialog-title">🗄️ Sunucuya Bağlan — SQL Server</div>
    <div class="dialog-body">
      <div class="dialog-field"><label>Sunucu Türü</label><select><option>Veritabanı Altyapısı</option></select></div>
      <div class="dialog-field"><label>Sunucu Adı</label><input id="f-server" type="text" autocomplete="off"></div>
      <div class="dialog-field"><label>Kimlik Doğrulama</label><select><option>SQL Server Kimlik Doğrulaması</option></select></div>
      <div class="dialog-field"><label>Kullanıcı Adı</label><input id="f-user" type="text" autocomplete="off"></div>
      <div class="dialog-field"><label>Parola</label><input id="f-pass" type="password" autocomplete="off"></div>
    </div>
    <div class="dialog-footer">
      <button class="btn-dialog" onclick="document.getElementById('connect-dialog').style.display='none'">İptal</button>
      <button class="btn-connect" id="btn-connect-ok">Bağlan</button>
    </div>
  </div>
</div>

<!-- MENU BAR -->
<div id="menubar">
  <div class="menu-item">Dosya</div><div class="menu-item">Düzen</div><div class="menu-item">Görünüm</div>
  <div class="menu-item">Sorgu</div><div class="menu-item">Proje</div><div class="menu-item">Araçlar</div>
  <div class="menu-item">Pencere</div><div class="menu-item">Yardım</div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tb-btn">📄 Yeni Sorgu</button>
  <button class="tb-btn">📂</button>
  <button class="tb-btn">💾</button>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" id="tb-execute" title="F5">▶ Çalıştır</button>
  <button class="tb-btn">⏹ Durdur</button>
  <button class="tb-btn">✓ Ayrıştır</button>
  <div class="tb-sep"></div>
  <select class="tb-db-select" id="db-select">
    <option value="">Veritabanı Seç</option>
    <option value="master">master</option>
    <option value="YafesPars">YafesPars</option>

</div>

<!-- MAIN -->
<div id="main">

  <!-- OBJECT EXPLORER -->
  <div id="oe">

    <div id="oe-search"><input placeholder="🔍 Nesne ara..." /></div>
    <div id="oe-tree"></div>

  <!-- EDITOR -->
  <div id="editor-area">

      </div>
    </div>
    <div id="sp-panel">

      <div class="sp-row">
        <div class="sp-field"><label>@TenantId</label><input id="sp-tid" value="tenant-001"></div>
        <div class="sp-field"><label>@FirstName</label><input id="sp-fn" value="Ahmet"></div>

        <div class="sp-field"><label>@NationalId</label><input id="sp-nid" value="12345678901"></div>
        <div class="sp-field"><label>@BirthDate</label><input id="sp-bd" value="1985-03-15"></div>

    <div id="results-panel">

<!-- STATUS BAR -->

<!-- TUTORIAL OVERLAY -->

  <div class="t-spotlight" id="spotlight" style="display:none"></div>

      <button class="btn-skip" id="btn-skip">Geç ›</button>

</div>

<script>

// TREE DATA

// ──────────────────────────────────────────────
// TREE RENDER
// ──────────────────────────────────────────────
const oeTree = document.getElementById('oe-tree');
function renderTree(nodes, depth) {
  const wrap = document.createDocumentFragment();
  nodes.forEach(n => {
    const hasKids = n.children && n.children.length > 0;
    const el = document.createElement('div');
    el.className = 'tree-node';
    el.id = 'nd-' + n.id;
    const row = document.createElement('div');
    row.className = 'tree-row';
    row.style.setProperty('--depth', (depth*16+4) + 'px');
    const arr = document.createElement('span');
    arr.className = 'expand-arrow';
    arr.id = 'arr-' + n.id;
    arr.textContent = hasKids ? '▶' : '';
    const ico = document.createElement('span');
    ico.className = 'tree-icon';
    ico.textContent = n.icon || '';
    const lbl = document.createElement('span');
    lbl.className = 'tree-label';
    lbl.textContent = n.label;
    row.append(arr, ico, lbl);
    el.appendChild(row);
    if (hasKids) {
      const ch = document.createElement('div');
      ch.className = 'tree-children';
      ch.id = 'ch-' + n.id;
      ch.appendChild(renderTree(n.children, depth+1));
      el.appendChild(ch);
      row.addEventListener('click', () => toggle(n.id));
    }
    row.addEventListener('click', () => {
      document.querySelectorAll('.tree-row.selected').forEach(r=>r.classList.remove('selected'));
      row.classList.add('selected');
      if (n.id.startsWith('t-')) onTableClick(n);
      if (n.id.startsWith('sp-')) onSpClick(n);
    });
    wrap.appendChild(el);
  });
  return wrap;
}
oeTree.appendChild(renderTree(TREE, 0));

function toggle(id) {
  const ch = document.getElementById('ch-' + id);
  const arr = document.getElementById('arr-' + id);
  if (!ch) return;
  const open = ch.classList.toggle('open');
  if (arr) arr.classList.toggle('open', open);
}
function expand(id) {
  const ch = document.getElementById('ch-' + id);
  const arr = document.getElementById('arr-' + id);
  if (ch && !ch.classList.contains('open')) {
    ch.classList.add('open');
    if (arr) arr.classList.add('open');
  }
}
function highlight(id) {
  const row = document.querySelector('#nd-' + id + ' > .tree-row');
  if (row) { row.classList.add('highlighted'); setTimeout(()=>row.classList.remove('highlighted'), 3200); }
}

// ──────────────────────────────────────────────
// CODE EDITOR
// ──────────────────────────────────────────────
const codeDisplay = document.getElementById('code-display');
const lnums = document.getElementById('line-nums');

function syncLineNums(text) {
  const n = (text.match(/\n/g)||[]).length + 1;
  lnums.textContent = Array.from({length:n},(_,i)=>i+1).join('\n');
}

function setCode(html, plain) {
  codeDisplay.innerHTML = html;
  syncLineNums(plain || codeDisplay.textContent);
}

function hlSQL(code) {
  const KW = /\b(SELECT|FROM|WHERE|AND|OR|NOT|INSERT|INTO|VALUES|UPDATE|SET|DELETE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AS|TOP|ORDER|BY|GROUP|HAVING|DISTINCT|COUNT|SUM|AVG|MAX|MIN|EXEC|EXECUTE|DECLARE|BEGIN|END|TRANSACTION|COMMIT|ROLLBACK|USE|GO|CREATE|TABLE|ALTER|DROP|INDEX|VIEW|PROCEDURE|FUNCTION|TRIGGER|IF|ELSE|WHILE|RETURN|OUTPUT|WITH|CASE|WHEN|THEN|ELSE|END|IS|NULL|NULLIF|ISNULL|CAST|CONVERT)\b/gi;
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/--[^\n]*/g, m=>`<span class="cmt">${m}</span>`)
    .replace(/'[^']*'/g, m=>`<span class="str">${m}</span>`)
    .replace(/\b\d+(?:\.\d+)?\b/g, m=>`<span class="num">${m}</span>`)
    .replace(KW, m=>`<span class="kw">${m.toUpperCase()}</span>`)
    .replace(/\[([^\]]+)\]/g, (_,m)=>`[<span class="tbl">${m}</span>]`)
    .replace(/\b(SP_\w+)\b/g, m=>`<span class="fn">${m}</span>`)
    .replace(/@\w+/g, m=>`<span class="op">${m}</span>`);
}

async function typeCode(lines, spd=24) {
  const plain = lines.join('\n');
  codeDisplay.innerHTML = '';
  for (let i = 0; i <= plain.length; i++) {
    const chunk = plain.substring(0, i);
    codeDisplay.innerHTML = hlSQL(chunk);
    syncLineNums(chunk);
    const ch = plain[i];
    if (ch === undefined) break;
    await sleep(ch==='\n' ? spd*3 : spd);
  }
}

function runProgress(cb, ms=900) {
  const bar = document.getElementById('exec-progress');
  bar.style.display = 'block';
  const t0 = Date.now();
  setTimeout(()=>{
    bar.style.display = 'none';
    const s = ((Date.now()-t0)/1000).toFixed(3);
    document.getElementById('exec-time').textContent = `00:00:${s}`;
    cb();
  }, ms);
}

document.getElementById('tb-execute').addEventListener('click', () => {
  const plain = codeDisplay.textContent;
  if (!plain.trim()) return;
  clearResults();
  let found = null;
  for (const [id,s] of Object.entries(SAMPLES)) {
    const tname = id.slice(2);
    if (plain.toLowerCase().includes(tname)) { found=s; break; }
  }
  runProgress(()=>{
    if (found) showGrid(found.cols, found.rows);
    else showMsg('<span class="msg-ok">✔ Komut başarıyla tamamlandı. (0 satır etkilendi)</span>');
  });
});

let step = 0;

function buildDots() {
  const dots = document.getElementById('tdots');
  dots.innerHTML = '';
  STEPS.forEach((_,i)=>{ const d=document.createElement('div'); d.className='t-dot'+(i===step?' on':''); dots.appendChild(d); });
}

function setSpot(sel) {
  const el = document.querySelector(sel);
  if (!el) return setSpotRaw(null);
  const r = el.getBoundingClientRect();
  const s = document.getElementById('spotlight');
  s.style.display='block';
  s.style.cssText=`display:block;top:${r.top-4}px;left:${r.left-4}px;width:${r.width+8}px;height:${r.height+8}px;`;
}
function setSpotRaw(el) {
  const s=document.getElementById('spotlight');
  if(!el){s.style.display='none';return;}
  const r=el.getBoundingClientRect();
  s.style.cssText=`display:block;top:${r.top-4}px;left:${r.left-4}px;width:${r.width+8}px;height:${r.height+8}px;`;
}

function posCard(sel, side) {
  const el = document.querySelector(sel);
  const card = document.getElementById('tcard');
  card.style.transform='';
  if (!el) { cardCenter(); return; }
  const r = el.getBoundingClientRect();
  const W=window.innerWidth, H=window.innerHeight, CW=340, CH=220, M=12;
  let top, left;
  if (side==='right')  { left=r.right+M; top=Math.max(M,Math.min(H-CH-M,r.top)); }
  else if (side==='below') { top=r.bottom+M; left=Math.max(M,Math.min(W-CW-M,r.left)); }
  else if (side==='above') { top=r.top-CH-M; left=Math.max(M,Math.min(W-CW-M,r.left)); }
  else { top=r.bottom+M; left=Math.max(M,Math.min(W-CW-M,r.left)); }
  if (left+CW>W) left=W-CW-M;
  if (top<M) top=M; if (top+CH>H) top=H-CH-M;
  card.style.top=top+'px'; card.style.left=left+'px';
}
function cardCenter() {
  const card=document.getElementById('tcard');
  card.style.top='50%'; card.style.left='50%'; card.style.transform='translate(-50%,-50%)';
}

async function showStep(i) {

}
