services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      YAFES_SQL_CONNECTION_STRING: "Server=sqlserver,1433;Database=YafesPars;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      Authentication__Authority: "${AUTH_AUTHORITY:-}"
      Authentication__Audience: "${AUTH_AUDIENCE:-}"
      Cors__AllowedOrigins: "http://localhost:3000"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  sqldata:
